apiVersion: 1

datasources:
  - name: Loki
    type: loki
    access: proxy
    url: http://loki:3100
    isDefault: true
    version: 1
    editable: false
    jsonData:
      maxLines: 1000
      # Loki'deki "service" ve "level" label'lari Grafana'da dogrudan
      # filtre olarak goruntulenir (Derived Fields degil, ana label)
      derivedFields:
        # traceId alanini Jaeger linkine donustur
        - name: TraceID
          matcherRegex: '"traceId":"(\w+)"'
          url: "http://localhost:16686/trace/$${__value.raw}"
          urlDisplayLabel: "Jaeger'da Gor"
