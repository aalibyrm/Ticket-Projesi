spring:
  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: http://localhost:8180/realms/TicketRealm
  datasource:
    url: jdbc:postgresql://localhost:5432/ticketdb
    username: admin
    password: password
  jpa:
    show-sql: true
    hibernate:
      ddl-auto: update

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/

zeebe:
  client:
    broker:
      gateway-address: localhost:26500
    security:
      plaintext: true

kafka:
  bootstrap-servers: localhost:9092
